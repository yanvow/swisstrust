<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificates — Checks Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../lib/supabase.js"></script>
  <style>
    .admin-badge { display:inline-block; background:#FF0000; color:white; font-size:.65rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:2px 7px; border-radius:4px; vertical-align:middle; margin-left:6px; }
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:white; border-radius:var(--radius); width:100%; max-width:500px; padding:32px; box-shadow:var(--shadow-lg); }
    .modal-title { font-weight:700; font-size:1.1rem; margin-bottom:4px; }
    .modal-sub { font-size:.875rem; color:var(--gray-400); margin-bottom:20px; }
    .deactivated td { opacity:.45; }
  </style>
</head>
<body>

<nav class="nav">
  <div class="container flex-between w-full">
    <button class="nav__hamburger" id="sidebar-toggle" aria-label="Open menu" aria-expanded="false">☰</button>
    <a href="../index.html" class="nav__logo">
      <div class="nav__logo-mark">C</div>
      Checks <span class="admin-badge">Admin</span>
    </a>
    <div class="nav__links">
      <span class="text-sm text-gray" id="nav-name"></span>
      <button onclick="sbHelpers.signOut()" class="btn btn-ghost btn-sm">Sign out</button>
    </div>
  </div>
</nav>

<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar__section">
      <div class="sidebar__label">Overview</div>
      <a href="dashboard.html" class="sidebar__link"><span class="sidebar__icon">⊞</span> Dashboard</a>
    </div>
    <div class="sidebar__section">
      <div class="sidebar__label">Users</div>
      <a href="tenants.html" class="sidebar__link"><span class="sidebar__icon">👤</span> Tenants</a>
      <a href="agencies.html" class="sidebar__link"><span class="sidebar__icon">🏢</span> Agencies</a>
      <a href="owners.html" class="sidebar__link"><span class="sidebar__icon">🏠</span> Owners</a>
    </div>
    <div class="sidebar__section">
      <div class="sidebar__label">Content</div>
      <a href="documents.html" class="sidebar__link"><span class="sidebar__icon">📄</span> Documents</a>
      <a href="certificates.html" class="sidebar__link sidebar__link--active"><span class="sidebar__icon">🪪</span> Certificates</a>
    </div>
  </aside>

  <main class="main-content">
    <div class="flex-between mb-16">
      <div>
        <div class="page-title">Certificates</div>
        <div class="page-subtitle" id="page-subtitle">Loading…</div>
      </div>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap;">
      <input type="text" id="search" placeholder="Search by tenant, agency, cert code, property…" oninput="filterTable()" style="flex:1; min-width:200px;">
      <select id="filter-mode" onchange="filterTable()" style="width:auto;">
        <option value="all">All modes</option>
        <option value="directed">Directed</option>
        <option value="open">Open</option>
        <option value="on_request">On-Request</option>
      </select>
      <select id="filter-active" onchange="filterTable()" style="width:auto;">
        <option value="active">Active only</option>
        <option value="all">Active + inactive</option>
        <option value="inactive">Inactive only</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Code</th>
            <th>Tenant</th>
            <th>Property</th>
            <th>Recipient</th>
            <th>Mode</th>
            <th>Eligible</th>
            <th>Date</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"><tr><td colspan="9" class="text-gray text-sm" style="padding:24px;text-align:center;">Loading…</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="flex-between mb-4">
      <div>
        <div class="modal-title" id="modal-title">Edit certificate</div>
        <div class="modal-sub" id="modal-sub"></div>
      </div>
      <button onclick="closeModal()" style="background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--gray-400);">×</button>
    </div>
    <div id="modal-err" style="display:none;color:var(--red);font-size:.875rem;margin-bottom:12px;"></div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group">
        <label>Income eligible</label>
        <select id="f-is_eligible">
          <option value="">— (keep computed)</option>
          <option value="true">Yes — Eligible</option>
          <option value="false">No — Review required</option>
        </select>
      </div>
      <div class="form-group">
        <label>Mode</label>
        <select id="f-mode">
          <option value="directed">Directed</option>
          <option value="open">Open</option>
          <option value="on_request">On-Request</option>
        </select>
      </div>
      <div class="form-group">
        <label>Active</label>
        <select id="f-is_active">
          <option value="true">Yes — Active</option>
          <option value="false">No — Deactivated</option>
        </select>
      </div>
    </div>

    <div class="form-group mt-4">
      <label>Admin note <span class="text-gray text-xs">(internal only, not shown to tenant)</span></label>
      <textarea id="f-admin_note" rows="2" style="resize:vertical;font-size:.875rem;"></textarea>
    </div>

    <div style="display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;">
      <button class="btn btn-primary" id="save-btn" onclick="saveCert()">Save changes</button>
      <button class="btn btn-outline btn-sm" id="deactivate-btn" onclick="quickDeactivate()" style="color:var(--red);border-color:var(--red);">Deactivate</button>
      <button class="btn btn-outline btn-sm" onclick="deleteCert()" style="color:var(--red);border-color:var(--red);">🗑 Delete</button>
      <button class="btn btn-ghost" onclick="closeModal()" style="margin-left:auto;">Cancel</button>
    </div>
  </div>
</div>

<script>
const modeLabel = { directed:'Directed', open:'Open', on_request:'On-Request' };
const modeColor = { directed:'var(--charcoal)', open:'var(--green)', on_request:'var(--amber)' };

let _all = [];
let _editingId = null;

(async () => {
  const user = await sbHelpers.requireAdmin();
  if (!user) return;
  document.getElementById('nav-name').textContent = user.email;

  const { data, error } = await sbHelpers.adminGetCertificates();
  if (error) { document.getElementById('page-subtitle').textContent = 'Error: ' + error.message; return; }
  _all = data || [];
  document.getElementById('page-subtitle').textContent =
    `${_all.length} certificates · ${_all.filter(c=>c.is_active).length} active`;
  filterTable();
})();

function filterTable() {
  const q      = document.getElementById('search').value.toLowerCase();
  const mode   = document.getElementById('filter-mode').value;
  const active = document.getElementById('filter-active').value;

  let rows = _all;
  if (q) rows = rows.filter(c =>
    (c.cert_code||'').toLowerCase().includes(q) ||
    (c.tenants?.full_name||'').toLowerCase().includes(q) ||
    (c.agencies?.company_name||'').toLowerCase().includes(q) ||
    (c.property_address||'').toLowerCase().includes(q)
  );
  if (mode  !== 'all') rows = rows.filter(c => c.mode === mode);
  if (active === 'active')   rows = rows.filter(c => c.is_active);
  if (active === 'inactive') rows = rows.filter(c => !c.is_active);
  renderTable(rows);
}

function renderTable(rows) {
  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="9" class="text-gray text-sm" style="padding:24px;text-align:center;">No certificates found.</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(c => {
    const recipient = c.agencies?.company_name || c.owner_email || c.unregistered_agency_name || '—';
    const date = new Date(c.created_at).toLocaleDateString('en-CH',{day:'2-digit',month:'short',year:'numeric'});
    return `
      <tr class="${c.is_active?'':'deactivated'}">
        <td><a href="../cert/cert-view.html?code=${c.cert_code}" target="_blank"
            class="font-mono font-bold" style="font-size:.85rem;letter-spacing:.06em;color:var(--charcoal);">${c.cert_code}</a></td>
        <td><div class="font-bold text-sm">${esc(c.tenants?.full_name||'—')}</div></td>
        <td class="text-sm">${esc(c.property_address||'—')}${c.property_city?', '+esc(c.property_city):''}</td>
        <td class="text-sm text-gray">${esc(recipient)}</td>
        <td><span class="badge" style="background:var(--gray-100);color:${modeColor[c.mode]};font-size:.7rem;font-weight:700;">${modeLabel[c.mode]||c.mode}</span></td>
        <td>${c.is_eligible===true?'<span class="badge badge-green" style="font-size:.7rem;">✓ Yes</span>':c.is_eligible===false?'<span class="badge badge-amber" style="font-size:.7rem;">Review</span>':'—'}</td>
        <td class="text-sm text-gray">${date}</td>
        <td style="white-space:nowrap;">
          <button class="btn btn-outline btn-sm" onclick="openEdit('${c.id}')">Edit</button>
          ${!c.is_active?'<span class="badge badge-gray" style="font-size:.65rem;margin-left:4px;">Inactive</span>':''}
        </td>
      </tr>`;
  }).join('');
}

function openEdit(id) {
  const c = _all.find(x => x.id === id);
  if (!c) return;
  _editingId = id;
  document.getElementById('modal-title').textContent = c.cert_code;
  document.getElementById('modal-sub').textContent =
    `${c.tenants?.full_name||'—'} · ${c.property_address||'—'}`;
  document.getElementById('modal-err').style.display = 'none';
  document.getElementById('f-is_eligible').value = c.is_eligible === true ? 'true' : c.is_eligible === false ? 'false' : '';
  document.getElementById('f-mode').value = c.mode || 'directed';
  document.getElementById('f-is_active').value = c.is_active ? 'true' : 'false';
  document.getElementById('f-admin_note').value = c.admin_note || '';
  document.getElementById('deactivate-btn').style.display = c.is_active ? 'inline-flex' : 'none';
  document.getElementById('modal').classList.add('open');
}

async function deleteCert() {
  if (!_editingId) return;
  const c = _all.find(x => x.id === _editingId);
  if (!confirm(`Permanently delete certificate ${c?.cert_code}? The QR code will stop working immediately and this cannot be undone.`)) return;
  const { error } = await sbHelpers.adminDeleteCertificate(_editingId);
  if (error) {
    document.getElementById('modal-err').textContent = error.message;
    document.getElementById('modal-err').style.display = 'block';
    return;
  }
  _all = _all.filter(x => x.id !== _editingId);
  filterTable();
  closeModal();
}

function closeModal() { document.getElementById('modal').classList.remove('open'); _editingId = null; }

function quickDeactivate() {
  if (!confirm('Deactivate this certificate? The QR code and cert code will no longer work.')) return;
  document.getElementById('f-is_active').value = 'false';
  saveCert();
}

async function saveCert() {
  if (!_editingId) return;
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Saving…';

  const fields = {
    mode:        document.getElementById('f-mode').value,
    is_active:   document.getElementById('f-is_active').value === 'true',
  };
  const el = document.getElementById('f-is_eligible').value;
  if (el !== '') fields.is_eligible = el === 'true';
  const note = document.getElementById('f-admin_note').value.trim();
  if (note) fields.admin_note = note;

  const { data, error } = await sbHelpers.adminUpdateCertificate(_editingId, fields);
  btn.disabled = false; btn.textContent = 'Save changes';

  if (error) {
    document.getElementById('modal-err').textContent = error.message;
    document.getElementById('modal-err').style.display = 'block';
    return;
  }

  const idx = _all.findIndex(c => c.id === _editingId);
  if (idx !== -1) _all[idx] = { ..._all[idx], ...data };
  filterTable();
  closeModal();
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
