<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owners — Checks Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../lib/supabase.js"></script>
  <style>
    .admin-badge { display:inline-block; background:#FF0000; color:white; font-size:.65rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:2px 7px; border-radius:4px; vertical-align:middle; margin-left:6px; }
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:white; border-radius:var(--radius); width:100%; max-width:480px; padding:32px; box-shadow:var(--shadow-lg); }
    .modal-title { font-weight:700; font-size:1.1rem; margin-bottom:20px; }
  </style>
</head>
<body>

<nav class="nav">
  <div class="container flex-between w-full">
    <a href="../index.html" class="nav__logo">
      <div class="nav__logo-mark">C</div>
      Checks <span class="admin-badge">Admin</span>
    </a>
    <div class="nav__links">
      <span class="text-sm text-gray" id="nav-name"></span>
      <button onclick="sbHelpers.signOut()" class="btn btn-ghost btn-sm">Sign out</button>
    </div>
  </div>
</nav>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar__section">
      <div class="sidebar__label">Overview</div>
      <a href="dashboard.html" class="sidebar__link"><span class="sidebar__icon">⊞</span> Dashboard</a>
    </div>
    <div class="sidebar__section">
      <div class="sidebar__label">Users</div>
      <a href="tenants.html" class="sidebar__link"><span class="sidebar__icon">👤</span> Tenants</a>
      <a href="agencies.html" class="sidebar__link"><span class="sidebar__icon">🏢</span> Agencies</a>
      <a href="owners.html" class="sidebar__link sidebar__link--active"><span class="sidebar__icon">🏠</span> Owners</a>
    </div>
    <div class="sidebar__section">
      <div class="sidebar__label">Content</div>
      <a href="documents.html" class="sidebar__link"><span class="sidebar__icon">📄</span> Documents</a>
      <a href="certificates.html" class="sidebar__link"><span class="sidebar__icon">🪪</span> Certificates</a>
    </div>
  </aside>

  <main class="main-content">
    <div class="flex-between mb-16">
      <div>
        <div class="page-title">Owners</div>
        <div class="page-subtitle" id="page-subtitle">Loading…</div>
      </div>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:20px;">
      <input type="text" id="search" placeholder="Search by name, address…" oninput="filterTable()" style="flex:1;">
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Property address</th>
            <th>Joined</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"><tr><td colspan="5" class="text-gray text-sm" style="padding:24px;text-align:center;">Loading…</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box" style="max-width:600px;">
    <div class="flex-between mb-20">
      <div class="modal-title" id="modal-title">Edit owner</div>
      <button onclick="closeModal()" style="background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--gray-400);">×</button>
    </div>
    <div id="modal-err" style="display:none;color:var(--red);font-size:.875rem;margin-bottom:12px;"></div>
    <div class="form-group"><label>Full name</label><input id="f-full_name" type="text"></div>
    <div class="form-group"><label>Phone</label><input id="f-phone" type="tel"></div>
    <div class="form-group"><label>Property address</label><input id="f-property_address" type="text"></div>
    <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;">
      <button class="btn btn-primary" id="save-btn" onclick="saveEdit()">Save changes</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <div style="margin-left:auto;display:flex;gap:8px;">
        <button class="btn btn-outline btn-sm" id="suspend-btn" onclick="toggleSuspend()"
          style="color:var(--amber);border-color:var(--amber);">Suspend</button>
        <button class="btn btn-outline btn-sm" onclick="deleteOwner()"
          style="color:var(--red);border-color:var(--red);">Delete</button>
      </div>
    </div>

    <hr style="border:none;border-top:1px solid var(--gray-200);margin:20px 0;">

    <div style="font-weight:600;font-size:.9rem;color:var(--charcoal);margin-bottom:12px;">Payment</div>
    <div id="payment-section"><div class="text-sm text-gray">Loading…</div></div>

    <hr style="border:none;border-top:1px solid var(--gray-200);margin:20px 0;">

    <div style="font-weight:600;font-size:.9rem;color:var(--red);margin-bottom:12px;">Danger zone</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-outline btn-sm" id="clear-info-btn" onclick="adminClearInfo()"
        style="color:var(--amber);border-color:var(--amber);">Clear all information</button>
    </div>
    <div id="danger-err" style="display:none;color:var(--red);font-size:.8rem;margin-top:8px;"></div>
  </div>
</div>

<script>
let _all = [];
let _editingId = null;

(async () => {
  const user = await sbHelpers.requireAdmin();
  if (!user) return;
  document.getElementById('nav-name').textContent = user.email;

  const { data, error } = await sbHelpers.adminGetOwners();
  if (error) { document.getElementById('page-subtitle').textContent = 'Error: ' + error.message; return; }
  _all = data || [];
  document.getElementById('page-subtitle').textContent =
    `${_all.length} owner${_all.length !== 1 ? 's' : ''} registered`;
  renderTable(_all);
})();

function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  let rows = _all;
  if (q) rows = rows.filter(o =>
    (o.full_name||'').toLowerCase().includes(q) ||
    (o.email||'').toLowerCase().includes(q) ||
    (o.property_address||'').toLowerCase().includes(q) ||
    (o.phone||'').toLowerCase().includes(q)
  );
  renderTable(rows);
}

function renderTable(rows) {
  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="text-gray text-sm" style="padding:24px;text-align:center;">No owners found.</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(o => `
    <tr style="${o.is_suspended?'opacity:.5;':''}">
      <td>
        <div class="font-bold">${esc(o.full_name||'—')}</div>
        ${o.email ? `<div class="text-xs text-gray">${esc(o.email)}</div>` : ''}
        ${o.is_suspended ? '<span class="badge badge-red" style="font-size:.65rem;">Suspended</span>' : ''}
      </td>
      <td class="text-sm">${esc(o.phone||'—')}</td>
      <td class="text-sm text-gray">${esc(o.property_address||'—')}</td>
      <td class="text-sm text-gray">${new Date(o.created_at).toLocaleDateString('en-CH',{day:'2-digit',month:'short',year:'numeric'})}</td>
      <td><button class="btn btn-outline btn-sm" onclick="openEdit('${o.id}')">Edit</button></td>
    </tr>`).join('');
}

async function loadOwnerPayment(userId) {
  const container = document.getElementById('payment-section');
  if (!userId) { container.innerHTML = '<div class="text-sm text-gray">No auth account linked.</div>'; return; }
  const [{ data: billing }, { data: methods }, { data: invoices }] = await Promise.all([
    sbHelpers.adminGetBillingProfile(userId),
    sbHelpers.adminGetPaymentMethods(userId),
    sbHelpers.adminGetInvoices(userId),
  ]);
  let html = '';
  if (billing) {
    html += `<div style="font-size:.8rem;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Billing info</div>`;
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">`;
    if (billing.full_name) html += `<div><span style="font-size:.75rem;color:var(--gray-400);">Name</span><div class="text-sm">${esc(billing.full_name)}</div></div>`;
    if (billing.email) html += `<div><span style="font-size:.75rem;color:var(--gray-400);">Email</span><div class="text-sm">${esc(billing.email)}</div></div>`;
    if (billing.address) html += `<div style="grid-column:1/-1;"><span style="font-size:.75rem;color:var(--gray-400);">Address</span><div class="text-sm">${esc(billing.address)}</div></div>`;
    if (billing.phone_number) html += `<div><span style="font-size:.75rem;color:var(--gray-400);">Phone</span><div class="text-sm">${esc((billing.phone_country_code||'')+' '+billing.phone_number)}</div></div>`;
    if (billing.tax_ids && billing.tax_ids.length) html += `<div><span style="font-size:.75rem;color:var(--gray-400);">Tax IDs</span><div class="text-sm">${billing.tax_ids.map(esc).join(', ')}</div></div>`;
    html += `</div>`;
  }
  if (methods && methods.length) {
    html += `<div style="font-size:.8rem;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Payment methods</div>`;
    html += methods.map(m => {
      const icon = m.method_type === 'wire_transfer' ? '🏦' : m.method_type === 'credit_card' ? '💳' : '📱';
      const name = m.method_type === 'wire_transfer' ? `Wire — ${m.iban||''}` : m.method_type === 'credit_card' ? `${m.card_brand==='visa'?'Visa':'Mastercard'} •••• ${m.card_last4||''}` : `TWINT ${m.twint_phone||''}`;
      return `<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--gray-100);"><span style="font-size:1.1rem;">${icon}</span><div style="flex:1;font-size:.875rem;">${esc(name)}</div>${m.is_default?'<span class="badge badge-green" style="font-size:.65rem;">Default</span>':''}</div>`;
    }).join('') + '<div style="margin-bottom:12px;"></div>';
  }
  if (invoices && invoices.length) {
    const SB = { paid:'badge-green', pending:'badge-amber', overdue:'badge-red' };
    html += `<div style="font-size:.8rem;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Invoices</div>`;
    html += invoices.map(inv => {
      const date = new Date(inv.issued_at).toLocaleDateString('en-CH',{day:'2-digit',month:'short',year:'numeric'});
      return `<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--gray-100);"><div style="flex:1;min-width:0;"><div class="text-sm font-bold">${esc(inv.invoice_number)}</div><div class="text-xs text-gray">${esc(inv.description||'—')} · ${date}</div></div><div class="text-sm font-bold" style="margin-right:8px;">CHF ${Number(inv.amount_chf).toFixed(2)}</div><span class="badge ${SB[inv.status]||'badge-gray'}" style="font-size:.65rem;">${inv.status}</span></div>`;
    }).join('');
  }
  container.innerHTML = html || '<div class="text-sm text-gray">No payment information on file.</div>';
}

async function adminClearInfo() {
  if (!_editingId) return;
  const o = _all.find(x => x.id === _editingId);
  if (!confirm(`Clear profile information for "${o?.full_name||'this owner'}"? This cannot be undone.`)) return;
  const btn = document.getElementById('clear-info-btn');
  btn.disabled = true; btn.textContent = 'Clearing…';
  const { error } = await sbHelpers.adminClearOwnerInfo(_editingId);
  btn.disabled = false; btn.textContent = 'Clear all information';
  if (error) {
    document.getElementById('danger-err').textContent = error.message;
    document.getElementById('danger-err').style.display = 'block';
  } else {
    document.getElementById('danger-err').style.display = 'none';
    const idx = _all.findIndex(x => x.id === _editingId);
    if (idx !== -1) _all[idx] = { ..._all[idx], full_name: null, phone: null, property_address: null };
    filterTable();
  }
}

function openEdit(id) {
  const o = _all.find(x => x.id === id);
  if (!o) return;
  _editingId = id;
  const suspBtn = document.getElementById('suspend-btn');
  if (suspBtn) { suspBtn.textContent = o.is_suspended ? 'Unsuspend' : 'Suspend'; }
  document.getElementById('modal-title').textContent = 'Edit — ' + (o.full_name || 'Unnamed owner');
  document.getElementById('modal-err').style.display = 'none';
  document.getElementById('danger-err').style.display = 'none';
  document.getElementById('f-full_name').value       = o.full_name || '';
  document.getElementById('f-phone').value            = o.phone || '';
  document.getElementById('f-property_address').value = o.property_address || '';
  document.getElementById('modal').classList.add('open');
  loadOwnerPayment(o.user_id);
}

function closeModal() { document.getElementById('modal').classList.remove('open'); _editingId = null; }

async function saveEdit() {
  if (!_editingId) return;
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const fields = {
    full_name:        document.getElementById('f-full_name').value.trim() || null,
    phone:            document.getElementById('f-phone').value.trim() || null,
    property_address: document.getElementById('f-property_address').value.trim() || null,
  };
  const { data, error } = await sbHelpers.adminUpdateOwner(_editingId, fields);
  btn.disabled = false; btn.textContent = 'Save changes';
  if (error) { document.getElementById('modal-err').textContent = error.message; document.getElementById('modal-err').style.display='block'; return; }
  const idx = _all.findIndex(o => o.id === _editingId);
  if (idx !== -1) _all[idx] = { ..._all[idx], ...data };
  filterTable();
  closeModal();
}

async function toggleSuspend() {
  if (!_editingId) return;
  const o = _all.find(x => x.id === _editingId);
  const { data, error } = await sbHelpers.adminSuspendOwner(_editingId, !o.is_suspended);
  if (error) { alert('Error: ' + error.message); return; }
  const idx = _all.findIndex(x => x.id === _editingId);
  if (idx !== -1) _all[idx] = { ..._all[idx], ...data };
  filterTable(); closeModal();
}

async function deleteOwner() {
  if (!_editingId) return;
  const o = _all.find(x => x.id === _editingId);
  if (!confirm(`Delete owner "${o?.full_name}"? This cannot be undone.`)) return;
  const { error } = await sbHelpers.adminDeleteOwner(_editingId);
  if (error) { alert('Error: ' + error.message); return; }
  _all = _all.filter(x => x.id !== _editingId);
  filterTable(); closeModal();
}


function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
