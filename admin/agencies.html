<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agencies — Checks Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../lib/supabase.js"></script>
  <style>
    .admin-badge { display:inline-block; background:#FF0000; color:white; font-size:.65rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:2px 7px; border-radius:4px; vertical-align:middle; margin-left:6px; }
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:white; border-radius:var(--radius); width:100%; max-width:660px; max-height:90vh; overflow-y:auto; padding:32px; box-shadow:var(--shadow-lg); }
    .modal-title { font-weight:700; font-size:1.1rem; margin-bottom:4px; }
    .section-heading { font-weight:600; font-size:.9rem; color:var(--charcoal); margin-bottom:12px; }
    .section-divider { border:none; border-top:1px solid var(--gray-200); margin:20px 0; }
    tr.clickable { cursor:pointer; }
    tr.clickable:hover td { background:var(--gray-100); }
    .agent-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--gray-100); }
    .agent-row:last-child { border-bottom:none; }
    .toggle-verified { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:20px; font-size:.8rem; font-weight:600; cursor:pointer; border:1.5px solid; transition:.15s; }
    .toggle-verified.verified   { background:#F0FDF4; color:#15803D; border-color:#86EFAC; }
    .toggle-verified.unverified { background:#FEF2F2; color:#B91C1C; border-color:#FECACA; }
  </style>
</head>
<body>

<nav class="nav">
  <div class="container flex-between w-full">
    <a href="../index.html" class="nav__logo">
      <div class="nav__logo-mark">C</div>
      Checks <span class="admin-badge">Admin</span>
    </a>
    <div class="nav__links">
      <span class="text-sm text-gray" id="nav-name"></span>
      <button onclick="sbHelpers.signOut()" class="btn btn-ghost btn-sm">Sign out</button>
    </div>
  </div>
</nav>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar__section">
      <div class="sidebar__label">Overview</div>
      <a href="dashboard.html" class="sidebar__link"><span class="sidebar__icon">⊞</span> Dashboard</a>
    </div>
    <div class="sidebar__section">
      <div class="sidebar__label">Users</div>
      <a href="tenants.html" class="sidebar__link"><span class="sidebar__icon">👤</span> Tenants</a>
      <a href="agencies.html" class="sidebar__link sidebar__link--active"><span class="sidebar__icon">🏢</span> Agencies</a>
      <a href="owners.html" class="sidebar__link"><span class="sidebar__icon">🏠</span> Owners</a>
    </div>
    <div class="sidebar__section">
      <div class="sidebar__label">Content</div>
      <a href="documents.html" class="sidebar__link"><span class="sidebar__icon">📄</span> Documents</a>
      <a href="certificates.html" class="sidebar__link"><span class="sidebar__icon">🪪</span> Certificates</a>
    </div>
  </aside>

  <main class="main-content">
    <div class="flex-between mb-16">
      <div>
        <div class="page-title">Agencies</div>
        <div class="page-subtitle" id="page-subtitle">Loading…</div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openCreate()">+ New agency</button>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:20px;">
      <input type="text" id="search" placeholder="Search by name, address, email…" oninput="filterTable()" style="flex:1;">
      <select id="filter-verified" onchange="filterTable()" style="width:auto;">
        <option value="all">All agencies</option>
        <option value="verified">Verified only</option>
        <option value="unverified">Unverified only</option>
        <option value="registered">Registered (has login)</option>
        <option value="seeded">Pre-seeded (no login)</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Agency</th>
            <th>Contact email</th>
            <th>Address</th>
            <th>Verified</th>
            <th>Registered</th>
            <th>Joined</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"><tr><td colspan="7" class="text-gray text-sm" style="padding:24px;text-align:center;">Loading…</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<!-- ── Agency detail modal ──────────────────────────────── -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal-box">

    <!-- Header -->
    <div class="flex-between" style="margin-bottom:4px;">
      <div>
        <div class="modal-title" id="detail-title">Agency</div>
        <div class="text-sm text-gray" id="detail-sub"></div>
      </div>
      <button onclick="closeDetail()" style="background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--gray-400);">×</button>
    </div>

    <div id="detail-err" style="display:none;color:var(--red);font-size:.875rem;margin:12px 0;"></div>

    <hr class="section-divider">

    <!-- Agency fields -->
    <div class="section-heading">Agency details</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group"><label>Company name</label><input id="f-company_name" type="text"></div>
      <div class="form-group"><label>Contact email</label><input id="f-contact_email" type="email"></div>
      <div class="form-group" style="grid-column:1/-1;"><label>Address</label><input id="f-address" type="text"></div>
      <div class="form-group">
        <label>Verified on Checks</label>
        <select id="f-is_verified">
          <option value="false">No — unverified</option>
          <option value="true">Yes — verified ✓</option>
        </select>
      </div>
      <div class="form-group">
        <label>Suspended</label>
        <select id="f-is_suspended">
          <option value="false">No — active</option>
          <option value="true">Yes — suspended</option>
        </select>
      </div>
    </div>

    <!-- Save / Cancel -->
    <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;">
      <button class="btn btn-primary btn-sm" id="save-btn" onclick="saveDetail()">Save changes</button>
      <button class="btn btn-ghost btn-sm" onclick="closeDetail()">Cancel</button>
      <button class="btn btn-outline btn-sm" onclick="deleteAgency()"
        style="margin-left:auto;color:var(--red);border-color:var(--red);">Delete agency</button>
    </div>

    <hr class="section-divider">

    <!-- Members section -->
    <div class="flex-between" style="margin-bottom:12px;">
      <div class="section-heading" style="margin-bottom:0;">Members</div>
    </div>

    <div id="agents-list" style="margin-bottom:16px;">
      <div class="text-sm text-gray">Loading…</div>
    </div>

    <!-- Add member -->
    <div style="border-top:1px solid var(--gray-200);padding-top:14px;">
      <div style="font-weight:600;font-size:.8rem;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">Add member by email</div>
      <div style="display:flex;gap:8px;">
        <input id="new-agent-email" type="email" placeholder="agent@agency.ch" style="flex:1;font-size:.875rem;">
        <button class="btn btn-primary btn-sm" id="add-agent-btn" onclick="addAgent()">Add</button>
      </div>
      <div id="agents-err" style="display:none;color:var(--red);font-size:.8rem;margin-top:6px;"></div>
    </div>

    <hr class="section-divider">

    <div class="section-heading">Payment</div>
    <div id="payment-section"><div class="text-sm text-gray">Loading…</div></div>

    <hr class="section-divider">

    <div class="section-heading" style="color:var(--red);">Danger zone</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-outline btn-sm" id="clear-info-btn" onclick="adminClearInfo()"
        style="color:var(--amber);border-color:var(--amber);">Clear agency information</button>
    </div>
    <div id="danger-err" style="display:none;color:var(--red);font-size:.8rem;margin-top:8px;"></div>

  </div>
</div>

<!-- ── Create agency modal ──────────────────────────────── -->
<div class="modal-overlay" id="modal-create">
  <div class="modal-box" style="max-width:480px;">
    <div class="flex-between mb-20">
      <div class="modal-title">New agency</div>
      <button onclick="closeCreate()" style="background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--gray-400);">×</button>
    </div>
    <div id="create-err" style="display:none;color:var(--red);font-size:.875rem;margin-bottom:12px;"></div>
    <div class="form-group"><label>Company name <span class="req">*</span></label><input id="c-company_name" type="text" required></div>
    <div class="form-group"><label>Address <span class="req">*</span></label><input id="c-address" type="text" required></div>
    <div class="form-group"><label>Contact email <span class="req">*</span></label><input id="c-contact_email" type="email" required></div>
    <div class="form-group">
      <label>Verified on Checks</label>
      <select id="c-is_verified"><option value="false">No — unverified</option><option value="true">Yes — verified ✓</option></select>
    </div>
    <div style="display:flex;gap:10px;margin-top:20px;">
      <button class="btn btn-primary" id="create-btn" onclick="createAgency()">Create agency</button>
      <button class="btn btn-ghost" onclick="closeCreate()">Cancel</button>
    </div>
  </div>
</div>

<script>
let _all = [];
let _editingId = null;

const STATUS_COLOR = { active:'badge-green', pending:'badge-amber', suspended:'badge-red', removed:'badge-gray' };

(async () => {
  const user = await sbHelpers.requireAdmin();
  if (!user) return;
  document.getElementById('nav-name').textContent = user.email;

  const { data, error } = await sbHelpers.adminGetAgencies();
  if (error) { document.getElementById('page-subtitle').textContent = 'Error: ' + error.message; return; }
  _all = data || [];
  document.getElementById('page-subtitle').textContent =
    `${_all.length} agencies · ${_all.filter(a=>a.is_verified).length} verified`;
  renderTable(_all);
})();

// ── Table ─────────────────────────────────────────────────

function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const f = document.getElementById('filter-verified').value;
  let rows = _all;
  if (q) rows = rows.filter(a =>
    (a.company_name||'').toLowerCase().includes(q) ||
    (a.contact_email||'').toLowerCase().includes(q) ||
    (a.address||'').toLowerCase().includes(q)
  );
  if (f === 'verified')    rows = rows.filter(a => a.is_verified);
  if (f === 'unverified')  rows = rows.filter(a => !a.is_verified);
  if (f === 'registered')  rows = rows.filter(a => a.user_id);
  if (f === 'seeded')      rows = rows.filter(a => !a.user_id);
  renderTable(rows);
}

function renderTable(rows) {
  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="text-gray text-sm" style="padding:24px;text-align:center;">No agencies found.</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(a => `
    <tr class="clickable" onclick="openDetail('${a.id}')" style="${a.is_suspended?'opacity:.5;':''}">
      <td>
        <div class="font-bold">${esc(a.company_name)}</div>
        ${a.is_suspended ? '<span class="badge badge-red" style="font-size:.65rem;">Suspended</span>' : ''}
      </td>
      <td class="text-sm">${esc(a.contact_email||'—')}</td>
      <td class="text-sm text-gray">${esc(a.address||'—')}</td>
      <td onclick="event.stopPropagation();">
        <button class="toggle-verified ${a.is_verified?'verified':'unverified'}"
          onclick="toggleVerify('${a.id}', this)" title="Click to toggle">
          ${a.is_verified ? '✓ Verified' : '✗ Unverified'}
        </button>
      </td>
      <td><span class="badge ${a.user_id?'badge-green':'badge-gray'}" style="font-size:.7rem;">${a.user_id?'Yes':'Pre-seeded'}</span></td>
      <td class="text-sm text-gray">${new Date(a.created_at).toLocaleDateString('en-CH',{day:'2-digit',month:'short',year:'numeric'})}</td>
      <td><button class="btn btn-outline btn-sm" onclick="event.stopPropagation();openDetail('${a.id}')">Edit</button></td>
    </tr>`).join('');
}

async function toggleVerify(id, btn) {
  const agency = _all.find(a => a.id === id);
  if (!agency) return;
  btn.disabled = true;
  const newVal = !agency.is_verified;
  const { data, error } = await sbHelpers.adminUpdateAgency(id, { is_verified: newVal });
  btn.disabled = false;
  if (error) { alert('Error: ' + error.message); return; }
  agency.is_verified = newVal;
  btn.className = `toggle-verified ${newVal?'verified':'unverified'}`;
  btn.textContent = newVal ? '✓ Verified' : '✗ Unverified';
}

// ── Agency detail modal ───────────────────────────────────

async function loadAgencyPayment(userId) {
  const container = document.getElementById('payment-section');
  if (!userId) { container.innerHTML = '<div class="text-sm text-gray">No auth account linked.</div>'; return; }
  const [{ data: billing }, { data: methods }, { data: invoices }] = await Promise.all([
    sbHelpers.adminGetBillingProfile(userId),
    sbHelpers.adminGetPaymentMethods(userId),
    sbHelpers.adminGetInvoices(userId),
  ]);
  let html = '';
  if (billing) {
    html += `<div style="font-size:.8rem;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Billing info</div>`;
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">`;
    if (billing.full_name) html += `<div><span class="text-xs text-gray">Name</span><div class="text-sm">${esc(billing.full_name)}</div></div>`;
    if (billing.email) html += `<div><span class="text-xs text-gray">Email</span><div class="text-sm">${esc(billing.email)}</div></div>`;
    if (billing.address) html += `<div style="grid-column:1/-1;"><span class="text-xs text-gray">Address</span><div class="text-sm">${esc(billing.address)}</div></div>`;
    if (billing.phone_number) html += `<div><span class="text-xs text-gray">Phone</span><div class="text-sm">${esc((billing.phone_country_code||'')+' '+billing.phone_number)}</div></div>`;
    if (billing.tax_ids && billing.tax_ids.length) html += `<div><span class="text-xs text-gray">Tax IDs</span><div class="text-sm">${billing.tax_ids.map(esc).join(', ')}</div></div>`;
    html += `</div>`;
  }
  if (methods && methods.length) {
    html += `<div style="font-size:.8rem;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Payment methods</div>`;
    html += methods.map(m => {
      const icon = m.method_type === 'wire_transfer' ? '🏦' : m.method_type === 'credit_card' ? '💳' : '📱';
      const name = m.method_type === 'wire_transfer' ? `Wire — ${m.iban||''}` : m.method_type === 'credit_card' ? `${m.card_brand==='visa'?'Visa':'Mastercard'} •••• ${m.card_last4||''}` : `TWINT ${m.twint_phone||''}`;
      return `<div class="agent-row"><span style="font-size:1.1rem;">${icon}</span><div style="flex:1;font-size:.875rem;">${esc(name)}</div>${m.is_default?'<span class="badge badge-green" style="font-size:.65rem;">Default</span>':''}</div>`;
    }).join('') + '<div style="margin-bottom:12px;"></div>';
  }
  if (invoices && invoices.length) {
    const SB = { paid:'badge-green', pending:'badge-amber', overdue:'badge-red' };
    html += `<div style="font-size:.8rem;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Invoices</div>`;
    html += invoices.map(inv => {
      const date = new Date(inv.issued_at).toLocaleDateString('en-CH',{day:'2-digit',month:'short',year:'numeric'});
      return `<div class="agent-row"><div style="flex:1;min-width:0;"><div class="text-sm font-bold">${esc(inv.invoice_number)}</div><div class="text-xs text-gray">${esc(inv.description||'—')} · ${date}</div></div><div class="text-sm font-bold" style="margin-right:8px;">CHF ${Number(inv.amount_chf).toFixed(2)}</div><span class="badge ${SB[inv.status]||'badge-gray'}" style="font-size:.65rem;">${inv.status}</span></div>`;
    }).join('');
  }
  container.innerHTML = html || '<div class="text-sm text-gray">No payment information on file.</div>';
}

async function adminClearInfo() {
  if (!_editingId) return;
  const a = _all.find(x => x.id === _editingId);
  if (!confirm(`Clear agency information for "${a?.company_name}"? This cannot be undone.`)) return;
  const btn = document.getElementById('clear-info-btn');
  btn.disabled = true; btn.textContent = 'Clearing…';
  const { error } = await sbHelpers.adminUpdateAgency(_editingId, { company_name: '', address: '', contact_email: '' });
  btn.disabled = false; btn.textContent = 'Clear agency information';
  if (error) {
    document.getElementById('danger-err').textContent = error.message;
    document.getElementById('danger-err').style.display = 'block';
  } else {
    document.getElementById('danger-err').style.display = 'none';
    const idx = _all.findIndex(x => x.id === _editingId);
    if (idx !== -1) _all[idx] = { ..._all[idx], company_name: '', address: '', contact_email: '' };
    filterTable();
  }
}

async function openDetail(id) {
  const a = _all.find(x => x.id === id);
  if (!a) return;
  _editingId = id;

  document.getElementById('detail-title').textContent = a.company_name;
  document.getElementById('detail-sub').textContent =
    (a.contact_email || '—') + ' · ' + (a.is_verified ? 'Verified' : 'Unverified') +
    (a.is_suspended ? ' · Suspended' : '');
  document.getElementById('detail-err').style.display = 'none';

  document.getElementById('f-company_name').value  = a.company_name || '';
  document.getElementById('f-address').value       = a.address || '';
  document.getElementById('f-contact_email').value = a.contact_email || '';
  document.getElementById('f-is_verified').value   = a.is_verified ? 'true' : 'false';
  document.getElementById('f-is_suspended').value  = a.is_suspended ? 'true' : 'false';

  document.getElementById('new-agent-email').value = '';
  document.getElementById('agents-err').style.display = 'none';

  document.getElementById('danger-err').style.display = 'none';
  document.getElementById('modal-detail').classList.add('open');
  await loadAgents();
  await loadAgencyPayment(a.user_id);
}

function closeDetail() {
  document.getElementById('modal-detail').classList.remove('open');
  _editingId = null;
}

async function saveDetail() {
  if (!_editingId) return;
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const fields = {
    company_name:  document.getElementById('f-company_name').value.trim(),
    address:       document.getElementById('f-address').value.trim(),
    contact_email: document.getElementById('f-contact_email').value.trim(),
    is_verified:   document.getElementById('f-is_verified').value === 'true',
    is_suspended:  document.getElementById('f-is_suspended').value === 'true',
  };
  const { data, error } = await sbHelpers.adminUpdateAgency(_editingId, fields);
  btn.disabled = false; btn.textContent = 'Save changes';
  if (error) {
    document.getElementById('detail-err').textContent = error.message;
    document.getElementById('detail-err').style.display = 'block';
    return;
  }
  const idx = _all.findIndex(a => a.id === _editingId);
  if (idx !== -1) _all[idx] = { ..._all[idx], ...data };
  filterTable();
  closeDetail();
}

async function deleteAgency() {
  if (!_editingId) return;
  const a = _all.find(x => x.id === _editingId);
  if (!confirm(`Delete agency "${a?.company_name}"? This cannot be undone.`)) return;
  const { error } = await sbHelpers.adminDeleteAgency(_editingId);
  if (error) { alert('Error: ' + error.message); return; }
  _all = _all.filter(x => x.id !== _editingId);
  filterTable();
  closeDetail();
}

// ── Members (agents) ──────────────────────────────────────

async function loadAgents() {
  const list = document.getElementById('agents-list');
  list.innerHTML = '<div class="text-sm text-gray">Loading…</div>';
  const { data, error } = await sbHelpers.adminGetAgentsByAgency(_editingId);
  if (error) {
    list.innerHTML = `<div class="text-sm" style="color:var(--red);">${esc(error.message)}</div>`;
    return;
  }
  if (!data || !data.length) {
    list.innerHTML = '<div class="text-sm text-gray">No members yet.</div>';
    return;
  }
  list.innerHTML = data.map(ag => {
    const displayName = (ag.first_name || ag.last_name)
      ? esc((ag.first_name || '') + ' ' + (ag.last_name || '')).trim()
      : null;
    const joinedDate = new Date(ag.invited_at).toLocaleDateString('en-CH',{day:'2-digit',month:'short',year:'numeric'});
    const subLine = (ag.user_id ? 'Accepted' : 'Pending') + ' · Invited ' + joinedDate;
    return `
    <div class="agent-row" id="agent-row-${ag.id}">
      <div style="flex:1;min-width:0;">
        ${displayName ? `<div class="font-bold text-sm">${displayName}</div>` : ''}
        <div class="${displayName ? 'text-xs text-gray' : 'font-bold text-sm'}" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(ag.email)}</div>
        <div class="text-xs text-gray">${subLine}</div>
      </div>
      <span class="badge ${STATUS_COLOR[ag.status]||'badge-gray'}" style="font-size:.7rem;flex-shrink:0;">${ag.status}</span>
      <button class="btn btn-outline btn-sm" onclick="toggleAgentSuspend('${ag.id}', ${ag.status !== 'suspended'})"
        style="color:var(--amber);border-color:var(--amber);font-size:.75rem;flex-shrink:0;">
        ${ag.status === 'suspended' ? 'Reactivate' : 'Suspend'}
      </button>
      <button class="btn btn-outline btn-sm" onclick="removeAgent('${ag.id}')"
        style="color:var(--red);border-color:var(--red);font-size:.75rem;flex-shrink:0;">Remove</button>
    </div>`;
  }).join('');
}

async function addAgent() {
  const email = document.getElementById('new-agent-email').value.trim();
  if (!email) return;
  const btn = document.getElementById('add-agent-btn');
  btn.disabled = true; btn.textContent = 'Adding…';
  const { error } = await sbHelpers.adminCreateAgent(_editingId, email);
  btn.disabled = false; btn.textContent = 'Add';
  if (error) {
    document.getElementById('agents-err').textContent = error.message;
    document.getElementById('agents-err').style.display = 'block';
    return;
  }
  document.getElementById('new-agent-email').value = '';
  document.getElementById('agents-err').style.display = 'none';
  await loadAgents();
}

async function toggleAgentSuspend(agentId, suspend) {
  const { error } = await sbHelpers.adminSuspendAgent(agentId, suspend);
  if (error) { alert('Error: ' + error.message); return; }
  await loadAgents();
}

async function removeAgent(agentId) {
  if (!confirm('Remove this member from the agency?')) return;
  const { error } = await sbHelpers.adminDeleteAgent(agentId);
  if (error) { alert('Error: ' + error.message); return; }
  await loadAgents();
}

// ── Create agency modal ───────────────────────────────────

function openCreate() { document.getElementById('modal-create').classList.add('open'); }
function closeCreate() {
  document.getElementById('modal-create').classList.remove('open');
  document.getElementById('create-err').style.display = 'none';
  ['c-company_name','c-address','c-contact_email'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  document.getElementById('c-is_verified').value = 'false';
}

async function createAgency() {
  const name  = document.getElementById('c-company_name').value.trim();
  const addr  = document.getElementById('c-address').value.trim();
  const email = document.getElementById('c-contact_email').value.trim();
  if (!name || !addr || !email) {
    document.getElementById('create-err').textContent = 'Company name, address and email are required.';
    document.getElementById('create-err').style.display = 'block'; return;
  }
  const btn = document.getElementById('create-btn');
  btn.disabled = true; btn.textContent = 'Creating…';
  const { data, error } = await sbHelpers.adminCreateAgency({
    company_name: name, address: addr, contact_email: email,
    is_verified: document.getElementById('c-is_verified').value === 'true',
  });
  btn.disabled = false; btn.textContent = 'Create agency';
  if (error) { document.getElementById('create-err').textContent = error.message; document.getElementById('create-err').style.display='block'; return; }
  _all.unshift(data);
  filterTable();
  closeCreate();
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
