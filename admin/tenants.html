<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tenants — SwissTrust Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../lib/supabase.js"></script>
  <style>
    .admin-badge { display:inline-block; background:#FF0000; color:white; font-size:.65rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:2px 7px; border-radius:4px; vertical-align:middle; margin-left:6px; }
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:white; border-radius:var(--radius); width:100%; max-width:560px; max-height:90vh; overflow-y:auto; padding:32px; box-shadow:var(--shadow-lg); }
    .modal-title { font-weight:700; font-size:1.1rem; margin-bottom:20px; }
    .field-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .search-bar { display:flex; gap:10px; margin-bottom:20px; }
    .search-bar input { flex:1; }
    tr.clickable { cursor:pointer; }
    tr.clickable:hover td { background:var(--gray-100); }
  </style>
</head>
<body>

<nav class="nav">
  <div class="container flex-between w-full">
    <a href="../index.html" class="nav__logo">
      <div class="nav__logo-mark">ST</div>
      SwissTrust <span class="admin-badge">Admin</span>
    </a>
    <div class="nav__links">
      <span class="text-sm text-gray" id="nav-name"></span>
      <button onclick="sbHelpers.signOut()" class="btn btn-ghost btn-sm">Sign out</button>
    </div>
  </div>
</nav>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar__section">
      <div class="sidebar__label">Overview</div>
      <a href="dashboard.html" class="sidebar__link"><span class="sidebar__icon">⊞</span> Dashboard</a>
    </div>
    <div class="sidebar__section">
      <div class="sidebar__label">Users</div>
      <a href="tenants.html" class="sidebar__link sidebar__link--active"><span class="sidebar__icon">👤</span> Tenants</a>
      <a href="agencies.html" class="sidebar__link"><span class="sidebar__icon">🏢</span> Agencies</a>
      <a href="owners.html" class="sidebar__link"><span class="sidebar__icon">🏠</span> Owners</a>
    </div>
    <div class="sidebar__section">
      <div class="sidebar__label">Content</div>
      <a href="documents.html" class="sidebar__link"><span class="sidebar__icon">📄</span> Documents</a>
      <a href="certificates.html" class="sidebar__link"><span class="sidebar__icon">🪪</span> Certificates</a>
    </div>
  </aside>

  <main class="main-content">
    <div class="flex-between mb-16">
      <div>
        <div class="page-title">Tenants</div>
        <div class="page-subtitle" id="page-subtitle">Loading…</div>
      </div>
    </div>

    <div class="search-bar">
      <input type="text" id="search" placeholder="Search by name, nationality, employer…" oninput="filterTable()">
      <select id="filter-complete" onchange="filterTable()" style="width:auto;">
        <option value="all">All profiles</option>
        <option value="complete">Complete only</option>
        <option value="incomplete">Incomplete only</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Nationality / Permit</th>
            <th>Employer</th>
            <th>Salary (gross)</th>
            <th>Occupants</th>
            <th>Profile</th>
            <th>Joined</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"><tr><td colspan="8" class="text-gray text-sm" style="padding:24px;text-align:center;">Loading…</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="flex-between mb-20">
      <div class="modal-title" id="modal-title">Edit tenant</div>
      <button onclick="closeModal()" style="background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--gray-400);">×</button>
    </div>
    <div id="modal-err" style="display:none;color:var(--red);font-size:.875rem;margin-bottom:12px;"></div>
    <div class="field-grid">
      <div class="form-group"><label>Full name</label><input id="f-full_name" type="text"></div>
      <div class="form-group"><label>Nationality</label>
        <select id="f-nationality">
          <option value="">—</option>
          <optgroup label="Switzerland">
            <option value="Swiss">Swiss</option>
          </optgroup>
          <optgroup label="Europe">
            <option value="Albanian">Albanian</option>
            <option value="Austrian">Austrian</option>
            <option value="Belgian">Belgian</option>
            <option value="Bosnian">Bosnian</option>
            <option value="Bulgarian">Bulgarian</option>
            <option value="Croatian">Croatian</option>
            <option value="Czech">Czech</option>
            <option value="Danish">Danish</option>
            <option value="Dutch">Dutch</option>
            <option value="Finnish">Finnish</option>
            <option value="French">French</option>
            <option value="German">German</option>
            <option value="Greek">Greek</option>
            <option value="Hungarian">Hungarian</option>
            <option value="Irish">Irish</option>
            <option value="Italian">Italian</option>
            <option value="Kosovan">Kosovan</option>
            <option value="Latvian">Latvian</option>
            <option value="Lithuanian">Lithuanian</option>
            <option value="Luxembourgish">Luxembourgish</option>
            <option value="Macedonian">Macedonian</option>
            <option value="Moldovan">Moldovan</option>
            <option value="Montenegrin">Montenegrin</option>
            <option value="Norwegian">Norwegian</option>
            <option value="Polish">Polish</option>
            <option value="Portuguese">Portuguese</option>
            <option value="Romanian">Romanian</option>
            <option value="Serbian">Serbian</option>
            <option value="Slovak">Slovak</option>
            <option value="Slovenian">Slovenian</option>
            <option value="Spanish">Spanish</option>
            <option value="Swedish">Swedish</option>
            <option value="Turkish">Turkish</option>
            <option value="Ukrainian">Ukrainian</option>
            <option value="British">British</option>
          </optgroup>
          <optgroup label="Africa">
            <option value="Algerian">Algerian</option>
            <option value="Angolan">Angolan</option>
            <option value="Cameroonian">Cameroonian</option>
            <option value="Congolese">Congolese</option>
            <option value="Egyptian">Egyptian</option>
            <option value="Ethiopian">Ethiopian</option>
            <option value="Ghanaian">Ghanaian</option>
            <option value="Ivorian">Ivorian</option>
            <option value="Kenyan">Kenyan</option>
            <option value="Moroccan">Moroccan</option>
            <option value="Nigerian">Nigerian</option>
            <option value="Senegalese">Senegalese</option>
            <option value="South African">South African</option>

            <option value="Brazilian">Brazilian</option>

            <option value="Chilean">Chilean</option>
            <option value="Colombian">Colombian</option>
            <option value="Cuban">Cuban</option>
            <option value="Dominican">Dominican</option>

            <option value="Mexican">Mexican</option>
            <option value="Peruvian">Peruvian</option>

          </optgroup>

            <option value="Bangladeshi">Bangladeshi</option>
            <option value="Chinese">Chinese</option>
            <option value="Georgian">Georgian</option>
            <option value="Indian">Indian</option>
            <option value="Indonesian">Indonesian</option>
            <option value="Iranian">Iranian</option>
            <option value="Iraqi">Iraqi</option>
            <option value="Israeli">Israeli</option>
            <option value="Japanese">Japanese</option>
            <option value="Jordanian">Jordanian</option>
            <option value="Kazakh">Kazakh</option>
            <option value="Korean">Korean</option>
            <option value="Kurdish">Kurdish</option>
            <option value="Lebanese">Lebanese</option>
            <option value="Malaysian">Malaysian</option>
            <option value="Pakistani">Pakistani</option>
            <option value="Palestinian">Palestinian</option>
            <option value="Philippine">Philippine</option>
            <option value="Saudi">Saudi</option>
            <option value="Sri Lankan">Sri Lankan</option>
            <option value="Syrian">Syrian</option>
            <option value="Thai">Thai</option>
            <option value="Vietnamese">Vietnamese</option>
          </optgroup>
          <optgroup label="Oceania">
            <option value="Australian">Australian</option>
            <option value="New Zealander">New Zealander</option>
          </optgroup>
        </select>
      </div>
      <div class="form-group"><label>Date of birth</label><input id="f-date_of_birth" type="date"></div>
      <div class="form-group"><label>Permit type</label>
        <select id="f-permit_type">
          <option value="">—</option>
          <option value="swiss">Swiss</option>
          <option value="B">B</option>
          <option value="C">C</option>
          <option value="G">G</option>
          <option value="L">L</option>
        </select>
      </div>
      <div class="form-group" style="grid-column:1/-1;"><label>Current address</label><input id="f-current_address" type="text"></div>
      <div class="form-group"><label>Employer</label><input id="f-employer_name" type="text"></div>
      <div class="form-group"><label>Job role</label><input id="f-job_role" type="text"></div>
      <div class="form-group"><label>Employment start</label><input id="f-employment_start_date" type="date"></div>
      <div class="form-group"><label>Monthly gross (CHF)</label><input id="f-monthly_gross_salary" type="number" step="100"></div>
      <div class="form-group"><label>Occupants</label><input id="f-occupant_count" type="number" min="1" max="10"></div>
      <div class="form-group">
        <label>Smoker</label>
        <select id="f-is_smoker"><option value="false">No</option><option value="true">Yes</option></select>
      </div>
      <div class="form-group">
        <label>Pets</label>
        <select id="f-has_pets"><option value="false">No</option><option value="true">Yes</option></select>
      </div>
      <div class="form-group">
        <label>Profile complete</label>

      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:20px;">
      <button class="btn btn-primary" id="save-btn" onclick="saveEdit()">Save changes</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
let _allTenants = [];
let _editingId  = null;

(async () => {
  const user = await sbHelpers.requireAdmin();
  if (!user) return;
  document.getElementById('nav-name').textContent = user.email;

  const { data, error } = await sbHelpers.adminGetTenants();
  if (error) { document.getElementById('page-subtitle').textContent = 'Error loading tenants: ' + error.message; return; }
  _allTenants = data || [];
  document.getElementById('page-subtitle').textContent = `${_allTenants.length} tenant${_allTenants.length !== 1 ? 's' : ''} registered`;
  renderTable(_allTenants);
})();

function filterTable() {
  const q      = document.getElementById('search').value.toLowerCase();
  const filter = document.getElementById('filter-complete').value;
  let rows = _allTenants;
  if (q) rows = rows.filter(t =>
    (t.full_name||'').toLowerCase().includes(q) ||
    (t.nationality||'').toLowerCase().includes(q) ||
    (t.employer_name||'').toLowerCase().includes(q)
  );
  if (filter === 'complete')   rows = rows.filter(t => t.profile_complete);
  if (filter === 'incomplete') rows = rows.filter(t => !t.profile_complete);
  renderTable(rows);
}

function renderTable(rows) {
  const tbody = document.getElementById('tbody');
  if (!rows.length) { tbody.innerHTML = '<tr><td colspan="8" class="text-gray text-sm" style="padding:24px;text-align:center;">No tenants found.</td></tr>'; return; }
  tbody.innerHTML = rows.map(t => `
    <tr class="clickable" onclick="openEdit('${t.id}')">
      <td><div class="font-bold">${esc(t.full_name||'—')}</div></td>
      <td>${esc(t.nationality||'—')} ${t.permit_type ? `<span class="badge badge-gray" style="font-size:.7rem;">${t.permit_type}</span>` : ''}</td>
      <td class="text-sm">${esc(t.employer_name||'—')}</td>
      <td class="text-sm">${t.monthly_gross_salary ? 'CHF '+Number(t.monthly_gross_salary).toLocaleString() : '—'}</td>
      <td class="text-sm">${t.occupant_count||1}</td>
      <td><span class="badge ${t.profile_complete?'badge-green':'badge-amber'}" style="font-size:.7rem;">${t.profile_complete?'Complete':'Incomplete'}</span></td>
      <td class="text-sm text-gray">${new Date(t.created_at).toLocaleDateString('en-CH',{day:'2-digit',month:'short',year:'numeric'})}</td>
      <td><button class="btn btn-outline btn-sm" onclick="event.stopPropagation();openEdit('${t.id}')">Edit</button></td>
    </tr>`).join('');
}

function openEdit(id) {
  const t = _allTenants.find(x => x.id === id);
  if (!t) return;
  _editingId = id;
  document.getElementById('modal-title').textContent = 'Edit — ' + (t.full_name || 'Unnamed tenant');
  document.getElementById('modal-err').style.display = 'none';

  const fields = ['full_name','nationality','date_of_birth','permit_type','current_address',
    'employer_name','job_role','employment_start_date','monthly_gross_salary','occupant_count'];
  fields.forEach(k => {
    const el = document.getElementById('f-'+k);
    if (el) el.value = t[k] ?? '';
  });
  document.getElementById('f-is_smoker').value = t.is_smoker ? 'true' : 'false';
  document.getElementById('f-has_pets').value  = t.has_pets  ? 'true' : 'false';
  document.getElementById('f-profile_complete').value = t.profile_complete ? 'true' : 'false';

  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); _editingId = null; }

async function saveEdit() {
  if (!_editingId) return;
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Saving…';

  const fields = {
    full_name:             document.getElementById('f-full_name').value.trim() || null,
    nationality:           document.getElementById('f-nationality').value.trim() || null,
    date_of_birth:         document.getElementById('f-date_of_birth').value || null,
    permit_type:           document.getElementById('f-permit_type').value || null,
    current_address:       document.getElementById('f-current_address').value.trim() || null,
    employer_name:         document.getElementById('f-employer_name').value.trim() || null,
    job_role:              document.getElementById('f-job_role').value.trim() || null,
    employment_start_date: document.getElementById('f-employment_start_date').value || null,
    monthly_gross_salary:  parseFloat(document.getElementById('f-monthly_gross_salary').value) || null,
    occupant_count:        parseInt(document.getElementById('f-occupant_count').value) || 1,
    is_smoker:             document.getElementById('f-is_smoker').value === 'true',
    has_pets:              document.getElementById('f-has_pets').value === 'true',
    profile_complete:      document.getElementById('f-profile_complete').value === 'true',
  };

  const { data, error } = await sbHelpers.adminUpdateTenant(_editingId, fields);
  btn.disabled = false; btn.textContent = 'Save changes';

  if (error) { document.getElementById('modal-err').textContent = error.message; document.getElementById('modal-err').style.display='block'; return; }

  // Update local cache
  const idx = _allTenants.findIndex(t => t.id === _editingId);
  if (idx !== -1) _allTenants[idx] = { ..._allTenants[idx], ...data };
  filterTable();
  closeModal();
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
