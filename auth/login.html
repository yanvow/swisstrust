<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — SwissTrust</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="auth-page">

<nav class="nav">
  <div class="container flex-between w-full">
    <a href="../index.html" class="nav__logo">
      <div class="nav__logo-mark">ST</div>
      SwissTrust
    </a>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-card__logo">
      <div class="auth-card__logo-mark">ST</div>
      SwissTrust
    </div>
    <h1 class="auth-card__title">Welcome back</h1>
    <p class="auth-card__sub">Sign in to your tenant or agency account</p>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email address <span class="req">*</span></label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password <span class="req">*</span></label>
        <input type="password" id="password" placeholder="••••••••" required>
        <div class="form-hint"><a href="#" style="color:var(--charcoal);">Forgot password?</a></div>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">Sign in</button>
    </form>

    <div class="auth-divider mt-24"><span>or continue as</span></div>

    <div class="flex gap-16 mt-16">
      <a href="tenant-register.html" class="btn btn-outline btn-full">New tenant</a>
      <a href="agency-register.html" class="btn btn-outline btn-full">New agency</a>
    </div>

    <div class="auth-card__footer mt-24">
      <a href="../index.html">← Back to homepage</a>
    </div>
  </div>
</div>

<script>
function handleLogin(e) {
  e.preventDefault();
  // Demo: route by email prefix
  const email = document.getElementById('email').value;
  if (email.startsWith('agency')) {
    window.location.href = '../agency/dashboard.html';
  } else {
    window.location.href = '../tenant/dashboard.html';
  }
}
</script>
</body>
</html>
