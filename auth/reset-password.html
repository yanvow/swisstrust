<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set new password — Checks</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../lib/supabase.js"></script>
</head>
<body class="auth-page">

<nav class="nav">
  <div class="container flex-between w-full">
    <a href="../index.html" class="nav__logo">
      <div class="nav__logo-mark">C</div>
      Checks
    </a>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-card__logo">
      <div class="auth-card__logo-mark">C</div>
      Checks
    </div>

    <!-- Loading state while exchanging the code -->
    <div id="loading-panel">
      <p class="auth-card__sub" style="text-align:center;">Verifying your reset link…</p>
    </div>

    <!-- Error state -->
    <div id="error-panel" style="display:none;">
      <p class="auth-card__sub" style="color:var(--red);">This reset link is invalid or has expired.</p>
      <a href="forgot-password.html" class="btn btn-outline btn-full mt-8">Request a new link</a>
    </div>

    <!-- New password form -->
    <div id="form-panel" style="display:none;">
      <h1 class="auth-card__title">Set a new password</h1>
      <p class="auth-card__sub">Choose a strong password for your account.</p>

      <form onsubmit="setNewPassword(event)">
        <div class="form-group">
          <label for="password">New password <span class="req">*</span></label>
          <input type="password" id="password" placeholder="At least 8 characters" minlength="8" required autofocus>
        </div>
        <div class="form-group">
          <label for="password2">Confirm new password <span class="req">*</span></label>
          <input type="password" id="password2" placeholder="Repeat your password" minlength="8" required>
        </div>
        <div id="pw-error" style="display:none; color:var(--red); font-size:.875rem; margin-bottom:12px;"></div>
        <button type="submit" id="submit-btn" class="btn btn-primary btn-full">Set new password</button>
      </form>
    </div>

    <!-- Success state -->
    <div id="success-panel" style="display:none;">
      <div style="background:#F0FDF4; border:1px solid #86EFAC; border-radius:var(--radius); padding:16px 18px; font-size:.875rem; color:#15803D; margin-bottom:20px;">
        Password updated successfully.
      </div>
      <a href="login.html" class="btn btn-primary btn-full">Sign in with your new password</a>
    </div>
  </div>
</div>

<script>
(async () => {
  // Supabase sends ?code=... (PKCE) for the recovery link
  const code = new URLSearchParams(window.location.search).get('code');

  if (!code) {
    // Might be a legacy implicit-flow link with #access_token + type=recovery in the hash
    const hash = new URLSearchParams(window.location.hash.replace('#', '?'));
    if (hash.get('type') === 'recovery') {
      // Implicit flow: session already set by Supabase JS on page load
      showForm();
      return;
    }
    showErrorPanel();
    return;
  }

  const { error } = await _sb.auth.exchangeCodeForSession(code);
  if (error) { showErrorPanel(); return; }
  showForm();
})();

function showForm() {
  document.getElementById('loading-panel').style.display = 'none';
  document.getElementById('form-panel').style.display = 'block';
}

function showErrorPanel() {
  document.getElementById('loading-panel').style.display = 'none';
  document.getElementById('error-panel').style.display = 'block';
}

async function setNewPassword(e) {
  e.preventDefault();
  const pw1 = document.getElementById('password').value;
  const pw2 = document.getElementById('password2').value;
  const errEl = document.getElementById('pw-error');
  errEl.style.display = 'none';

  if (pw1 !== pw2) {
    errEl.textContent = 'Passwords do not match.';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('submit-btn');
  sbHelpers.setLoading(btn, true, 'Set new password');

  const { error } = await _sb.auth.updateUser({ password: pw1 });

  sbHelpers.setLoading(btn, false, 'Set new password');

  if (error) {
    errEl.textContent = error.message;
    errEl.style.display = 'block';
    return;
  }

  await _sb.auth.signOut();
  document.getElementById('form-panel').style.display = 'none';
  document.getElementById('success-panel').style.display = 'block';
}
</script>
</body>
</html>
