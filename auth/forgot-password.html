<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password — Checks</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../lib/supabase.js"></script>
</head>
<body class="auth-page">

<nav class="nav">
  <div class="container flex-between w-full">
    <a href="../index.html" class="nav__logo">
      <div class="nav__logo-mark">C</div>
      Checks
    </a>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-card__logo">
      <div class="auth-card__logo-mark">C</div>
      Checks
    </div>
    <h1 class="auth-card__title">Reset your password</h1>
    <p class="auth-card__sub">Enter your email address and we'll send you a link to set a new password.</p>

    <div id="success-panel" style="display:none;">
      <div style="background:#F0FDF4; border:1px solid #86EFAC; border-radius:var(--radius); padding:16px 18px; font-size:.875rem; color:#15803D; margin-bottom:20px; line-height:1.5;" id="success-msg"></div>
      <a href="login.html" class="btn btn-outline btn-full">Back to sign in</a>
    </div>

    <form id="forgot-form" onsubmit="sendReset(event)">
      <div class="form-group">
        <label for="email">Email address <span class="req">*</span></label>
        <input type="email" id="email" placeholder="you@example.com" required autofocus>
      </div>
      <div id="error-msg" style="display:none; color:var(--red); font-size:.875rem; margin-bottom:12px;"></div>
      <button type="submit" id="submit-btn" class="btn btn-primary btn-full">Send reset link</button>
    </form>

    <div class="auth-card__footer mt-24">
      <a href="login.html">← Back to sign in</a>
    </div>
  </div>
</div>

<script>
async function sendReset(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  sbHelpers.setLoading(btn, true, 'Send reset link');
  sbHelpers.hideError('error-msg');

  const email      = document.getElementById('email').value.trim();
  const redirectTo = window.location.origin
    + window.location.pathname.replace('forgot-password.html', 'reset-password.html');

  const { error } = await _sb.auth.resetPasswordForEmail(email, { redirectTo });

  sbHelpers.setLoading(btn, false, 'Send reset link');

  if (error) {
    sbHelpers.showError('error-msg', error.message);
    return;
  }

  document.getElementById('forgot-form').style.display = 'none';
  document.querySelector('.auth-card__footer').style.display = 'none';
  document.getElementById('success-panel').style.display = 'block';
  document.getElementById('success-msg').textContent =
    `A reset link has been sent to ${email}. Check your inbox and click the link to set a new password. The link expires after 1 hour.`;
}
</script>
</body>
</html>
